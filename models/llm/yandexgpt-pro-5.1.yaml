model: yandexgpt/rc
label:
  en_US: YandexGPT Pro 5.1
  ru_RU: YandexGPT Pro 5.1
model_type: llm
features:
  - agent-thought
model_properties:
  mode: chat
  context_size: 32768
parameter_rules:
  - name: temperature
    use_template: temperature
    default: 0.3
    min: 0
    max: 1
  - name: top_p
    use_template: top_p
    default: 0.9
    min: 0
    max: 1
  - name: max_tokens
    use_template: max_tokens
    default: 8192
    min: 1
    max: 32768
pricing:
  input: '0.0067'
  output: '0.0067'
  unit: '0.001'
  currency: USD
